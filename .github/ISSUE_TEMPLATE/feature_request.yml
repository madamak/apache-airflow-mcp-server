name: Feature request
description: Suggest a new tool or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem would this solve?
      description: Describe the workflow you're trying to accomplish (e.g. "my agent needs to inspect XCom values to debug data handoffs").
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: A new tool, a new parameter on an existing tool, a config option, ...
  - type: input
    id: airflow-version
    attributes:
      label: Airflow version(s) this applies to
      placeholder: e.g. 2.x, 3.x, both
