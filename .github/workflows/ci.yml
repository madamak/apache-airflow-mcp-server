name: CI

on:
  push:
    branches: ["main"]
  # No base-branch filter: stacked PRs (base = another PR's branch) need CI too.
  pull_request:
  workflow_call:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  lint-and-test:
    # Keep these names stable because main branch protection requires them.
    name: lint-and-test (${{ matrix.python-version }}, ${{ matrix.client-family }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
        # Test against both apache-airflow-client majors:
        # 2.x targets Airflow 2 (API v1), 3.x targets Airflow 3 (API v2)
        client-family: ["<3", ">=3,<4"]
        include:
          - client-family: "<3"
            airflow-client: "==2.10.0"
          - client-family: ">=3,<4"
            airflow-client: "==3.3.0"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4.2.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: uv sync --frozen --group dev
      - name: Install apache-airflow-client matrix version
        env:
          AIRFLOW_CLIENT_SPEC: apache-airflow-client${{ matrix.airflow-client }}
        run: uv pip install "$AIRFLOW_CLIENT_SPEC"
      - name: Lint
        run: uv run --no-sync ruff check .
      - name: Test
        run: uv run --no-sync pytest -q

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Scan repository with Gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
