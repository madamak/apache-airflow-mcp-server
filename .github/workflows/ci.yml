name: CI

on:
  push:
    branches: ["main"]
  # No base-branch filter: stacked PRs (base = another PR's branch) need CI too.
  pull_request:
  workflow_call:

jobs:
  lint-and-test:
    # Keep these names stable because main branch protection requires them.
    name: lint-and-test (${{ matrix.python-version }}, ${{ matrix.client-family }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
        # Test against both apache-airflow-client majors:
        # 2.x targets Airflow 2 (API v1), 3.x targets Airflow 3 (API v2)
        client-family: ["<3", ">=3,<4"]
        include:
          - client-family: "<3"
            airflow-client: "==2.10.0"
          - client-family: ">=3,<4"
            airflow-client: "==3.3.0"
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: uv sync --frozen --group dev
      - name: Install apache-airflow-client matrix version
        run: uv pip install "apache-airflow-client${{ matrix.airflow-client }}"
      - name: Lint
        run: uv run --no-sync ruff check .
      - name: Test
        run: uv run --no-sync pytest -q

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Scan repository with Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
