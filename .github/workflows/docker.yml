name: Docker build

# Release images are published only by publish.yml after all release gates pass.
on:
  push:
    branches: ["main"]
    paths:
      - "Dockerfile"
      - "pyproject.toml"
      - "uv.lock"
      - "src/**"
      - ".github/workflows/docker.yml"
  pull_request:
    paths:
      - "Dockerfile"
      - "pyproject.toml"
      - "uv.lock"
      - "src/**"
      - ".github/workflows/docker.yml"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image without publishing
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          build-args: |
            VERSION=0.0.0
