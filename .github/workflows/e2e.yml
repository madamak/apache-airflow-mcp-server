name: E2E

# Spawns a real Airflow in Docker, seeds it with DAG runs (including failures),
# and drives every MCP tool against it via scripts/e2e.sh.
on:
  push:
    branches: ["main"]
  pull_request:
    paths:
      - "src/**"
      - "tests/**"
      - "scripts/e2e.sh"
      - ".github/workflows/e2e.yml"
      - "pyproject.toml"
      - "uv.lock"
  schedule:
    # Nightly: reruns the pinned compatibility pairs against runner/dependency drift.
    - cron: "17 4 * * *"
  workflow_call:

permissions:
  contents: read

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  e2e:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        entry: ["af2", "af3"]
    env:
      E2E_COMPOSE_PROJECT: airflow-mcp-e2e-${{ matrix.entry }}-${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4.2.0
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: uv sync --frozen --group dev
      - name: Run E2E suite (${{ matrix.entry }})
        env:
          # The harness prints project-scoped logs before tearing down on failure;
          # its temporary registry and bearer token never survive the step.
          E2E_DUMP_LOGS_ON_FAILURE: "1"
          E2E_ENTRY: ${{ matrix.entry }}
        run: ./scripts/e2e.sh "$E2E_ENTRY"
