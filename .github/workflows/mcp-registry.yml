name: Publish MCP Registry

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Immutable GitHub release tag to publish
        required: true
        type: string

concurrency:
  group: mcp-registry-${{ inputs.tag }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  verify-package:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4.2.0
        with:
          python-version: "3.12"
          enable-cache: false
      - name: Validate immutable release and package
        id: release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ inputs.tag }}
        run: |
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "tag must match vMAJOR.MINOR.PATCH, got: $TAG" >&2
            exit 1
          fi
          if [[ "$GITHUB_REF" != "refs/tags/$TAG" ]]; then
            echo "workflow must run from the release tag $TAG, got: $GITHUB_REF" >&2
            exit 1
          fi
          gh release view "$TAG" --json isDraft,isImmutable --jq \
            'if (.isDraft == false and .isImmutable == true) then true else error("release must be public and immutable") end'
          version="${TAG#v}"
          curl --proto '=https' --tlsv1.2 --fail --silent --show-error \
            "https://pypi.org/pypi/apache-airflow-mcp-server/$version/json" >/dev/null
          echo "version=$version" >> "$GITHUB_OUTPUT"
      - name: Verify the registry package command from PyPI
        env:
          AIRFLOW_MCP_API_VERSION: v2
          AIRFLOW_MCP_HOST: https://airflow.invalid
          AIRFLOW_MCP_READ_ONLY: "true"
          AIRFLOW_MCP_TOKEN: registry-smoke-test
          UV_DEFAULT_INDEX: https://pypi.org/simple
          VERSION: ${{ steps.release.outputs.version }}
        run: >-
          timeout 30s uvx --refresh
          --from "apache-airflow-mcp-server==$VERSION"
          apache-airflow-mcp-server --transport stdio </dev/null

  publish:
    needs: verify-package
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Revalidate immutable release and package
        id: release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ inputs.tag }}
        run: |
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "tag must match vMAJOR.MINOR.PATCH, got: $TAG" >&2
            exit 1
          fi
          if [[ "$GITHUB_REF" != "refs/tags/$TAG" ]]; then
            echo "workflow must run from the release tag $TAG, got: $GITHUB_REF" >&2
            exit 1
          fi
          gh release view "$TAG" --json isDraft,isImmutable --jq \
            'if (.isDraft == false and .isImmutable == true) then true else error("release must be public and immutable") end'
          version="${TAG#v}"
          curl --proto '=https' --tlsv1.2 --fail --silent --show-error \
            "https://pypi.org/pypi/apache-airflow-mcp-server/$version/json" >/dev/null
          echo "version=$version" >> "$GITHUB_OUTPUT"
      - name: Prepare versioned registry metadata
        env:
          VERSION: ${{ steps.release.outputs.version }}
        run: |
          jq --arg version "$VERSION" \
            '.version = $version | .packages |= map(if .registryType == "pypi" then .version = $version else . end)' \
            server.json > "$RUNNER_TEMP/server.json"
      - name: Install verified MCP publisher
        env:
          PUBLISHER_SHA256: 1370446bbe74d562608e8005a6ccce02d146a661fbd78674e11cc70b9618d6cf
          PUBLISHER_URL: https://github.com/modelcontextprotocol/registry/releases/download/v1.8.0/mcp-publisher_linux_amd64.tar.gz
        run: |
          archive="$RUNNER_TEMP/mcp-publisher.tar.gz"
          curl --proto '=https' --tlsv1.2 --fail --silent --show-error \
            --location --output "$archive" "$PUBLISHER_URL"
          echo "$PUBLISHER_SHA256  $archive" | sha256sum --check --strict
          tar -xzf "$archive" -C "$RUNNER_TEMP" mcp-publisher
      - name: Validate registry metadata
        run: "$RUNNER_TEMP/mcp-publisher validate $RUNNER_TEMP/server.json"
      - name: Authenticate with GitHub OIDC
        run: "$RUNNER_TEMP/mcp-publisher login github-oidc"
      - name: Publish to the official MCP Registry
        run: "$RUNNER_TEMP/mcp-publisher publish $RUNNER_TEMP/server.json"
