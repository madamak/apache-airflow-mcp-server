name: Release

# A semver tag is the release candidate. All validation and publication stays
# in this workflow run; the human-facing GitHub Release is created last.
on:
  push:
    tags:
      - "v*.*.*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  validate-ref:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Validate release tag
        id: version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "release tag must match vMAJOR.MINOR.PATCH, got: $TAG" >&2
            exit 1
          fi
          git fetch origin main
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "release tag must point to a commit on main" >&2
            exit 1
          fi
          set +e
          release_response="$(
            gh api --include "repos/$GITHUB_REPOSITORY/releases/tags/$TAG" 2>&1
          )"
          release_status=$?
          set -e
          if [[ "$release_status" == "0" ]]; then
            echo "a GitHub Release already exists for $TAG; aborting before publication" >&2
            exit 1
          elif ! grep -Eq '^HTTP/[0-9.]+ 404 ' <<< "$release_response"; then
            echo "could not confirm that no GitHub Release exists for $TAG" >&2
            echo "$release_response" >&2
            exit 1
          fi
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

  quality:
    needs: validate-ref
    uses: ./.github/workflows/ci.yml
    permissions:
      contents: read

  e2e:
    needs: validate-ref
    uses: ./.github/workflows/e2e.yml
    permissions:
      contents: read

  security:
    needs: validate-ref
    uses: ./.github/workflows/security.yml
    with:
      version: ${{ needs.validate-ref.outputs.version }}
    permissions:
      contents: read

  build:
    needs: validate-ref
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4.2.0
        with:
          python-version: "3.12"
          enable-cache: false
      - name: Build package
        run: uv build
      - name: Attest Python distributions
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-path: |
            dist/*.whl
            dist/*.tar.gz
      - name: Upload distribution
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist
          path: dist/
          if-no-files-found: error
          retention-days: 7

  wheel-test:
    needs: [validate-ref, build]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - client: apache-airflow-client==2.10.0
            api-version: v1
          - client: apache-airflow-client==3.3.0
            api-version: v2
    steps:
      - uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4.2.0
        with:
          python-version: "3.12"
          enable-cache: false
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: dist
          path: ${{ runner.temp }}/dist
      - name: Install exact release wheel
        env:
          CLIENT: ${{ matrix.client }}
        run: |
          uv venv "$RUNNER_TEMP/release-venv"
          uv pip install --python "$RUNNER_TEMP/release-venv/bin/python" \
            "$RUNNER_TEMP"/dist/*.whl "$CLIENT"
      - name: Verify artifact version, imports, and console protocol
        env:
          AIRFLOW_MCP_API_VERSION: ${{ matrix.api-version }}
          AIRFLOW_MCP_HOST: https://airflow.invalid
          AIRFLOW_MCP_READ_ONLY: "true"
          AIRFLOW_MCP_TOKEN: test-only-token
          EXPECTED_VERSION: ${{ needs.validate-ref.outputs.version }}
        run: |
          cd "$RUNNER_TEMP"
          "$RUNNER_TEMP/release-venv/bin/python" - <<'PY'
          import asyncio
          import importlib.metadata
          import os
          from pathlib import Path

          import airflow_mcp
          from fastmcp import Client
          from fastmcp.client.transports import StdioTransport

          venv = Path(os.environ["RUNNER_TEMP"]) / "release-venv"
          module_path = Path(airflow_mcp.__file__).resolve()
          assert module_path.is_relative_to(venv.resolve()), module_path
          assert importlib.metadata.version("apache-airflow-mcp-server") == os.environ[
              "EXPECTED_VERSION"
          ]

          async def verify_console(executable: str) -> None:
              child_env = dict(os.environ)
              child_env.pop("PYTHONPATH", None)
              child_env.pop("VIRTUAL_ENV", None)
              transport = StdioTransport(
                  command=str(venv / "bin" / executable),
                  args=["--transport", "stdio"],
                  env=child_env,
              )
              async with Client(transport) as client:
                  tools = {tool.name for tool in await client.list_tools()}
              assert "airflow_list_dags" in tools
              assert "airflow_clear_dag_run" not in tools

          for executable in ("airflow-mcp", "apache-airflow-mcp-server"):
              asyncio.run(verify_console(executable))
          PY

  publish-ghcr:
    needs: [validate-ref, quality, e2e, security, build, wheel-test]
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4.2.0
        with:
          python-version: "3.12"
          enable-cache: false
      - name: Reconfirm GitHub Release does not exist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          set +e
          release_response="$(
            gh api --include "repos/$GITHUB_REPOSITORY/releases/tags/$TAG" 2>&1
          )"
          release_status=$?
          set -e
          if [[ "$release_status" == "0" ]]; then
            echo "a GitHub Release appeared for $TAG; aborting before publication" >&2
            exit 1
          elif ! grep -Eq '^HTTP/[0-9.]+ 404 ' <<< "$release_response"; then
            echo "could not reconfirm that no GitHub Release exists for $TAG" >&2
            echo "$release_response" >&2
            exit 1
          fi
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5.10.0
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
      - name: Build and push image
        id: push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          labels: ${{ steps.meta.outputs.labels }}
          provenance: mode=max
          sbom: true
          build-args: |
            VERSION=${{ needs.validate-ref.outputs.version }}
          outputs: type=image,name=ghcr.io/${{ github.repository }},push-by-digest=true,name-canonical=true,push=true
      - name: Audit the published image digest
        env:
          IMAGE: ghcr.io/${{ github.repository }}@${{ steps.push.outputs.digest }}
        run: |
          docker pull "$IMAGE"
          ./scripts/security_scan_image.sh "$IMAGE" "$RUNNER_TEMP/release-security-reports"
      - name: Upload release security reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-security-reports
          path: ${{ runner.temp }}/release-security-reports/
          if-no-files-found: warn
          retention-days: 30
      - name: Attest the published image digest
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-name: ghcr.io/${{ github.repository }}
          subject-digest: ${{ steps.push.outputs.digest }}
      - name: Promote audited digest to release tags
        env:
          DIGEST: ${{ steps.push.outputs.digest }}
          IMAGE: ghcr.io/${{ github.repository }}
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          mapfile -t tags <<< "$TAGS"
          tag_args=()
          for tag in "${tags[@]}"; do
            [[ -n "$tag" ]] && tag_args+=(--tag "$tag")
          done
          if [[ "${#tag_args[@]}" -eq 0 ]]; then
            echo "metadata action produced no release tags" >&2
            exit 1
          fi
          docker buildx imagetools create "${tag_args[@]}" "$IMAGE@$DIGEST"
          for tag in "${tags[@]}"; do
            [[ -n "$tag" ]] || continue
            promoted_digest="$(docker buildx imagetools inspect "$tag" | awk '/^Digest:/ {print $2; exit}')"
            if [[ "$promoted_digest" != "$DIGEST" ]]; then
              echo "$tag resolved to $promoted_digest instead of $DIGEST" >&2
              exit 1
            fi
          done

  publish-pypi:
    needs: [validate-ref, build, publish-ghcr]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0

  publish-github-release:
    needs: [build, publish-pypi]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: dist
          path: dist/
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: release-security-reports
          path: security-reports/
      - name: Create draft GitHub Release with all assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: >-
          gh release create "$TAG" dist/* security-reports/*
          --draft --verify-tag --generate-notes
      - name: Publish immutable GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: gh release edit "$TAG" --draft=false

  dispatch-mcp-registry:
    needs: publish-github-release
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    steps:
      - name: Dispatch official MCP Registry publication
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: gh workflow run mcp-registry.yml --ref "$TAG" --field tag="$TAG"
